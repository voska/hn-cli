version: 2

builds:
  - main: ./cmd/hn
    binary: hn
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

brews:
  - name: hn
    homepage: "https://github.com/voska/hn-cli"
    description: "Agent-friendly Hacker News CLI via the Algolia API"
    license: "MIT"
    repository:
      owner: voska
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: voska-bot
      email: bot@voska.dev
    install: |
      bin.install "hn"
    test: |
      system "#{bin}/hn", "version"

scoops:
  - name: hn
    homepage: "https://github.com/voska/hn-cli"
    description: "Agent-friendly Hacker News CLI via the Algolia API"
    license: "MIT"
    repository:
      owner: voska
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
